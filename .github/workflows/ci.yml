name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./...

  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            label: linux-amd64
            binary_name: code-edit-agent
          - runner: windows-latest
            goos: windows
            goarch: amd64
            label: windows-amd64
            binary_name: code-edit-agent.exe
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            label: macos-amd64
            binary_name: code-edit-agent
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            label: macos-arm64
            binary_name: code-edit-agent

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -o "dist/${{ matrix.binary_name }}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-edit-agent-${{ matrix.label }}
          path: dist/${{ matrix.binary_name }}
          if-no-files-found: error
