name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            label: linux-amd64
            binary_name: code-edit-agent
            archive_ext: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            label: windows-amd64
            binary_name: code-edit-agent.exe
            archive_ext: zip
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            label: macos-amd64
            binary_name: code-edit-agent
            archive_ext: tar.gz
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            label: macos-arm64
            binary_name: code-edit-agent
            archive_ext: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -o "dist/${{ matrix.binary_name }}" .

      - name: Archive release bundle (Unix)
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          mkdir -p release
          archive_name="code-edit-agent_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}"
          tar -czf "release/${archive_name}" -C dist "${{ matrix.binary_name }}"

      - name: Archive release bundle (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $archiveName = "code-edit-agent_${env:GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "release/$archiveName"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-artifacts
          shasum -a 256 * > "code-edit-agent_${GITHUB_REF_NAME}_checksums.txt"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
